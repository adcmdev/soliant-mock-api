name: Deploy Application Only

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Set deployment environment
        run: |
          echo "ENV=PROD" >> $GITHUB_ENV
          echo "PORT=3030" >> $GITHUB_ENV
          echo "PROJECT_PATH=/home/ac/soliant-mock-api/soliant-mock-api" >> $GITHUB_ENV
          echo "APP_COMPOSE_FILE=docker-compose.yml" >> $GITHUB_ENV

      - name: Set Docker image name
        run: |
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | tr '/:' '_')
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-$BRANCH_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build and push Docker image to GHCR
        run: |
          export GH_PACKAGES_TOKEN="${{ secrets.GH_PACKAGES_TOKEN }}"

          docker build \
            --secret id=GH_PACKAGES_TOKEN,env=GH_PACKAGES_TOKEN \
            --build-arg GH_PACKAGES_TOKEN="$GH_PACKAGES_TOKEN" \
            --build-arg ENV="${{ env.ENV }}" \
            -t ${{ env.IMAGE_NAME }}:latest \
            --push -f Dockerfile .

      - name: SSH into the server and deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: "${{ secrets.SERVER_IP }}"
          username: "${{ secrets.SERVER_USER }}"
          key: "${{ secrets.SSH_PRIVATE_KEY }}"
          script: |
            cd "${{ env.PROJECT_PATH }}"

            rm -f ${{ env.APP_COMPOSE_FILE }}

            curl -fsSL \
              -H "Authorization: token ${{ secrets.GH_PACKAGES_TOKEN }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ github.repository }}/contents/${{ env.APP_COMPOSE_FILE }}?ref=${{ github.ref_name }}" \
              -o ${{ env.PROJECT_PATH }}/${{ env.APP_COMPOSE_FILE }}

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GH_PACKAGES_TOKEN }}

            export PATH=$PATH:"/usr/local/bin/":/usr/libexec/docker/cli-plugins

            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export ENV="${{ env.ENV }}"
            export PORT="${{ env.PORT }}"
            export GH_PACKAGES_TOKEN="${{ secrets.GH_PACKAGES_TOKEN }}"

            echo "🚀 Deploying application service..."
            docker-compose -f ${{ env.APP_COMPOSE_FILE }} pull
            docker-compose -f ${{ env.APP_COMPOSE_FILE }} stop
            docker-compose -f ${{ env.APP_COMPOSE_FILE }} down
            docker-compose -f ${{ env.APP_COMPOSE_FILE }} up -d

            echo "✅ Application deployment completed!"
